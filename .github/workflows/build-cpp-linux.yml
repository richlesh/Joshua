name: Build and Release C++ Linux

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v1.8.0)"
        required: true

jobs:
  build-cpp-linux:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ github.event.inputs.tag }}

      - name: Install Qt6 and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev cmake ninja-build rpm g++

      - name: Inject license salt
        run: |
          cat > src/License.cpp << EOF
          #include "License.h"

          const QByteArray LICENSE_SALT = "${{ secrets.LICENSE_SALT }}";
          EOF

      - name: Update version in CMakeLists.txt
        run: sed -i "s/project(Joshua VERSION [0-9.]*/project(Joshua VERSION ${{ steps.version.outputs.version }}/" CMakeLists.txt

      - name: Download Stockfish
        run: |
          if [ "${{ matrix.arch }}" = "x64" ]; then
            curl -sL "https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64-sse41-popcnt.tar" | tar xf -
            cp stockfish/stockfish-ubuntu-x86-64-sse41-popcnt resources/stockfish
          else
            # No official arm64 Linux binary - build from source
            git clone --depth 1 --branch sf_18 https://github.com/official-stockfish/Stockfish.git sf_src
            cd sf_src/src && make -j$(nproc) build ARCH=armv8 && cd ../..
            cp sf_src/src/stockfish resources/stockfish
          fi
          chmod +x resources/stockfish

      - name: Download KataGo
        run: |
          if [ "${{ matrix.arch }}" = "x64" ]; then
            curl -sL "https://github.com/lightvector/KataGo/releases/download/v1.16.5/katago-v1.16.5-eigen-linux-x64.zip" -o katago.zip
            unzip -j katago.zip katago -d resources/
            mv resources/katago resources/katago-bin && mv resources/katago-bin resources/katago
          else
            # Build from source for arm64
            sudo apt-get install -y libzip-dev libeigen3-dev
            git clone --depth 1 --branch v1.16.5 https://github.com/lightvector/KataGo.git katago_src
            cd katago_src/cpp && cmake -S . -B build -G Ninja -DUSE_BACKEND=EIGEN -DCMAKE_BUILD_TYPE=Release && cmake --build build && cd ../..
            cp katago_src/cpp/build/katago resources/katago
          fi
          chmod +x resources/katago
          # Download model
          curl -sL "https://media.katagotraining.org/uploaded/networks/models/kata1/kata1-b18c384nbt-s9996604416-d4316597426.bin.gz" \
            -o resources/katago-model.bin.gz
          # Create minimal GTP config
          cat > resources/katago-gtp.cfg << 'GCFG'
          rules = tromp-taylor
          allowResignation = true
          resignThreshold = -0.90
          resignConsecTurns = 3
          logDir = /tmp/katago-logs
          logAllGTPCommunication = false
          logSearchInfo = false
          numSearchThreads = 1
          GCFG

      - name: Configure and build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build

      - name: Create dist directory
        run: mkdir -p dist

      - name: Package DEB
        run: |
          ARCH=${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          VERSION=${{ steps.version.outputs.version }}
          PKG_DIR=pkg-deb/joshua_${VERSION}_${ARCH}
          mkdir -p ${PKG_DIR}/DEBIAN
          mkdir -p ${PKG_DIR}/usr/bin
          mkdir -p ${PKG_DIR}/usr/share/applications
          mkdir -p ${PKG_DIR}/usr/share/icons/hicolor/256x256/apps

          cp build/Joshua ${PKG_DIR}/usr/bin/
          cp resources/stockfish ${PKG_DIR}/usr/bin/stockfish-joshua
          cp resources/icons/app_icon_256.png ${PKG_DIR}/usr/share/icons/hicolor/256x256/apps/joshua.png

          cat > ${PKG_DIR}/usr/share/applications/joshua.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Joshua
          Comment=AI terminal game inspired by WarGames
          Exec=Joshua
          Icon=joshua
          Terminal=false
          Type=Application
          Categories=Game;
          StartupWMClass=Joshua
          DESKTOP

          cat > ${PKG_DIR}/DEBIAN/control << CTRL
          Package: joshua
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: Richard Lesh <richard@glowingcatsoftware.com>
          Description: AI terminal game inspired by WarGames
          Depends: libqt6widgets6
          Section: games
          Priority: optional
          CTRL

          dpkg-deb --build ${PKG_DIR}
          mv pkg-deb/*.deb dist/

      - name: Package RPM
        run: |
          ARCH=${{ matrix.arch == 'arm64' && 'aarch64' || 'x86_64' }}
          VERSION=${{ steps.version.outputs.version }}

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p rpmbuild/BUILDROOT/joshua-${VERSION}-1.${ARCH}/usr/bin
          mkdir -p rpmbuild/BUILDROOT/joshua-${VERSION}-1.${ARCH}/usr/share/applications
          mkdir -p rpmbuild/BUILDROOT/joshua-${VERSION}-1.${ARCH}/usr/share/icons/hicolor/256x256/apps

          cp build/Joshua rpmbuild/BUILDROOT/joshua-${VERSION}-1.${ARCH}/usr/bin/
          cp resources/stockfish rpmbuild/BUILDROOT/joshua-${VERSION}-1.${ARCH}/usr/bin/stockfish-joshua
          cp resources/icons/app_icon_256.png rpmbuild/BUILDROOT/joshua-${VERSION}-1.${ARCH}/usr/share/icons/hicolor/256x256/apps/joshua.png
          cp pkg-deb/*/usr/share/applications/joshua.desktop rpmbuild/BUILDROOT/joshua-${VERSION}-1.${ARCH}/usr/share/applications/

          cat > rpmbuild/SPECS/joshua.spec << SPEC
          Name: joshua
          Version: ${VERSION}
          Release: 1
          Summary: AI terminal game inspired by WarGames
          License: GPL-3.0

          Requires: qt6-qtbase

          %description
          AI terminal game inspired by WarGames.

          %files
          /usr/bin/Joshua
          /usr/bin/stockfish-joshua
          /usr/share/applications/joshua.desktop
          /usr/share/icons/hicolor/256x256/apps/joshua.png

          %post
          /usr/bin/gtk-update-icon-cache /usr/share/icons/hicolor &>/dev/null || :
          /usr/bin/update-desktop-database /usr/share/applications &>/dev/null || :

          %postun
          /usr/bin/gtk-update-icon-cache /usr/share/icons/hicolor &>/dev/null || :
          SPEC

          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
            --target ${ARCH} \
            -bb rpmbuild/SPECS/joshua.spec

          find rpmbuild/RPMS -name "*.rpm" -exec mv {} dist/ \;

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} \
            dist/*.deb dist/*.rpm --clobber
