name: Build and Release C++ Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v1.5.0)"
        required: true

jobs:
  build-cpp-windows:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: |
          $ver = "${{ github.event.inputs.tag }}" -replace '^v', ''
          echo "version=$ver" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: ${{ matrix.arch == 'arm64' && 'win64_msvc2022_arm64_cross_compiled' || 'win64_msvc2022_64' }}
          cache: true

      - name: Inject license salt
        run: |
          @"
          #include "License.h"

          const QByteArray LICENSE_SALT = "${{ secrets.LICENSE_SALT }}";
          "@ | Set-Content src/License.cpp
        shell: powershell

      - name: Update version in CMakeLists.txt
        run: |
          (Get-Content CMakeLists.txt) -replace 'project\(Joshua VERSION [0-9.]+', "project(Joshua VERSION ${{ steps.version.outputs.version }}" | Set-Content CMakeLists.txt
        shell: powershell

      - name: Download Stockfish
        run: |
          if ("${{ matrix.arch }}" -eq "arm64") {
            $sfUrl = "https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-windows-armv8.zip"
            $sfBin = "stockfish/stockfish-windows-armv8.exe"
          } else {
            $sfUrl = "https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-windows-x86-64-sse41-popcnt.zip"
            $sfBin = "stockfish/stockfish-windows-x86-64-sse41-popcnt.exe"
          }
          Invoke-WebRequest -Uri $sfUrl -OutFile stockfish.zip
          Expand-Archive stockfish.zip -DestinationPath .
          Copy-Item $sfBin resources/stockfish.exe
        shell: powershell

      - name: Download KataGo
        run: |
          $kgUrl = "https://github.com/lightvector/KataGo/releases/download/v1.16.5/katago-v1.16.5-eigen-windows-x64.zip"
          Invoke-WebRequest -Uri $kgUrl -OutFile katago.zip
          Expand-Archive katago.zip -DestinationPath katago_extract
          Copy-Item katago_extract/katago.exe resources/katago.exe
          # Download model
          Invoke-WebRequest -Uri "https://media.katagotraining.org/uploaded/networks/models/kata1/kata1-b18c384nbt-s9996604416-d4316597426.bin.gz" `
            -OutFile resources/katago-model.bin.gz
          # Create minimal GTP config
          @"
          rules = tromp-taylor
          allowResignation = true
          resignThreshold = -0.90
          resignConsecTurns = 3
          logDir = C:/temp/katago-logs
          logAllGTPCommunication = false
          logSearchInfo = false
          numSearchThreads = 1
          "@ | Set-Content resources/katago-gtp.cfg
        shell: powershell

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch == 'arm64' && 'amd64_arm64' || 'amd64' }}

      - name: Configure and build
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR/.."
          cmake --build build
        shell: powershell

      - name: Deploy Qt dependencies
        if: matrix.arch == 'x64'
        run: windeployqt build/Joshua.exe
        shell: cmd

      - name: Deploy Qt dependencies (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          $qtRoot = "$env:QT_ROOT_DIR"
          Copy-Item "$qtRoot/bin/Qt6Core.dll" build/
          Copy-Item "$qtRoot/bin/Qt6Gui.dll" build/
          Copy-Item "$qtRoot/bin/Qt6Widgets.dll" build/
          Copy-Item "$qtRoot/plugins/platforms" build/platforms -Recurse
          Copy-Item "$qtRoot/plugins/styles" build/styles -Recurse -ErrorAction SilentlyContinue
        shell: powershell

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
        shell: powershell

      - name: Bundle MSVC runtime
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $redistDir = Get-ChildItem "$vsPath\VC\Redist\MSVC\*\${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}\Microsoft.VC*.CRT" -Directory | Select-Object -Last 1
          Copy-Item "$redistDir\vcruntime140.dll" build/
          Copy-Item "$redistDir\vcruntime140_1.dll" build/ -ErrorAction SilentlyContinue
          Copy-Item "$redistDir\msvcp140.dll" build/
          Copy-Item "$redistDir\msvcp140_1.dll" build/ -ErrorAction SilentlyContinue
          Copy-Item "$redistDir\msvcp140_2.dll" build/ -ErrorAction SilentlyContinue
        shell: powershell

      - name: Create installer with NSIS
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          @"
          !include "MUI2.nsh"
          Name "Joshua ${version}"
          OutFile "dist\Joshua-${version}-${arch}-setup.exe"
          InstallDir "`$PROGRAMFILES\Joshua"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section
            SetOutPath "`$INSTDIR"
            File /r "build\*.*"
            CreateShortcut "`$DESKTOP\Joshua.lnk" "`$INSTDIR\Joshua.exe"
            CreateDirectory "`$SMPROGRAMS\Joshua"
            CreateShortcut "`$SMPROGRAMS\Joshua\Joshua.lnk" "`$INSTDIR\Joshua.exe"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            Delete "`$DESKTOP\Joshua.lnk"
            RMDir /r "`$SMPROGRAMS\Joshua"
          SectionEnd
          "@ | Set-Content installer.nsi

          mkdir dist
          makensis installer.nsi
        shell: powershell

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign installer with Azure Artifact Signing
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} `
            (Get-ChildItem dist\*.exe | Select-Object -ExpandProperty FullName) --clobber
        shell: powershell
